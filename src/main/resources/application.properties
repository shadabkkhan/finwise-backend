# Keep MySQL connections alive — prevents stale connection errors after PC sleep
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=60000

# Allow PDF uploads up to 10MB
# Default Spring limit is 1MB which is too small for bank statements
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server port
server.port=8080