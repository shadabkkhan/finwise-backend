# App name
spring.application.name=finwise-backend

# MySQL connection
spring.datasource.url=jdbc:mysql://localhost:3306/finwise_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Candidate@#2025
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

gemini.api.key=AIzaSyAANVjymC8RIbQgS12n-Plp0nowOo357Rg
# Switch to flash-lite — higher rate limits on free tier
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent

# JWT
jwt.secret=finwise-super-secret-key-2024-make-this-long-enough
